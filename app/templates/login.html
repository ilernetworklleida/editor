<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="theme-color" content="#0a0a0f">
  <title>Login · Editor</title>
  <link rel="preconnect" href="https://rsms.me/">
  <link rel="stylesheet" href="https://rsms.me/inter/inter.css">
  <link rel="stylesheet" href="/static/styles.css">
  <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24' fill='%23f97316'%3E%3Cpath d='M23 7l-7 5 7 5V7zM3 5h13v14H3z'/%3E%3C/svg%3E">
</head>
<body class="login-body">
  <main class="login-main">
    <div class="login-card">
      <a href="/" class="logo login-logo">
        <span class="logo-mark">
          <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round">
            <polygon points="23 7 16 12 23 17 23 7"></polygon>
            <rect x="1" y="5" width="15" height="14" rx="2" ry="2"></rect>
          </svg>
        </span>
        <span class="logo-text">REEL<span class="logo-accent">/</span>LAB</span>
      </a>
      <h1 class="login-title">Acceso</h1>
      <p class="login-sub">Pipeline personal de Reels &middot; uso interno</p>

      {% if error %}
        <div class="login-error">{{ error }}</div>
      {% endif %}

      <form method="post" action="/login" class="login-form" autocomplete="on">
        <input type="hidden" name="next" value="{{ next }}">
        <div class="field">
          <label for="email">Email</label>
          <input type="email" name="email" id="email" required
                 value="{{ email }}" autofocus autocomplete="username">
        </div>
        <div class="field">
          <label for="password">Contrase&ntilde;a</label>
          <input type="password" name="password" id="password" required
                 autocomplete="current-password">
        </div>
        <button type="submit" class="btn-primary btn-lg login-btn">
          Entrar
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="5" y1="12" x2="19" y2="12"></line><polyline points="12 5 19 12 12 19"></polyline></svg>
        </button>
      </form>

      <p class="login-foot">Sesion durante 14 dias. Logout desde el header.</p>
    </div>
  </main>
</body>
</html>
