<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="theme-color" content="#0a0a0f">
  <title>{% block title %}REEL/LAB — pipeline personal de Reels{% endblock %}</title>
  <link rel="preconnect" href="https://rsms.me/">
  <link rel="stylesheet" href="https://rsms.me/inter/inter.css">
  <link rel="stylesheet" href="/static/styles.css">
  <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24' fill='%23f97316'%3E%3Cpath d='M23 7l-7 5 7 5V7zM3 5h13v14H3z'/%3E%3C/svg%3E">
</head>
<body>
  <header class="header">
    <div class="container header-inner">
      <a href="/" class="logo">
        <span class="logo-mark" aria-hidden="true">
          <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round">
            <polygon points="23 7 16 12 23 17 23 7"></polygon>
            <rect x="1" y="5" width="15" height="14" rx="2" ry="2"></rect>
          </svg>
        </span>
        <span class="logo-text">REEL<span class="logo-accent">/</span>LAB</span>
      </a>
      <nav class="nav">
        <a href="/">Home</a>
        <a href="/jobs">Jobs</a>
        <a href="/schedules">Schedules</a>
        <a href="/profiles">Perfiles</a>
        <a href="/tokens">API</a>
        <a href="/stats">Stats</a>
        <a href="https://github.com/ilernetworklleida/editor" target="_blank" rel="noopener">
          GitHub
          <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
            <path d="M7 17 17 7"></path><path d="M7 7h10v10"></path>
          </svg>
        </a>
        {% if current_user %}
          <form method="post" action="/logout" class="logout-form">
            <span class="user-pill" title="{{ current_user }}">{{ current_user }}</span>
            <button type="submit" class="btn-link" title="Cerrar sesion">
              <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"></path><polyline points="16 17 21 12 16 7"></polyline><line x1="21" y1="12" x2="9" y2="12"></line></svg>
            </button>
          </form>
        {% endif %}
      </nav>
    </div>
  </header>
  <main class="main">
    <div class="container">
      {% block content %}{% endblock %}
    </div>
  </main>
  <footer class="footer">
    <div class="container">
      <span>REEL/LAB · pipeline local · &copy; @ilernetworklleida</span>
    </div>
  </footer>
  {% block scripts %}{% endblock %}
</body>
</html>
