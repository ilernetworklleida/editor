<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="theme-color" content="#0a0a0f">
  <title>{% block title %}Editor — Reels factory{% endblock %}</title>
  <link rel="preconnect" href="https://rsms.me/">
  <link rel="stylesheet" href="https://rsms.me/inter/inter.css">
  <link rel="stylesheet" href="/static/styles.css">
  <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24' fill='%23f97316'%3E%3Cpath d='M23 7l-7 5 7 5V7zM3 5h13v14H3z'/%3E%3C/svg%3E">
</head>
<body>
  <header class="header">
    <div class="container header-inner">
      <a href="/" class="logo">
        <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
          <polygon points="23 7 16 12 23 17 23 7"></polygon>
          <rect x="1" y="5" width="15" height="14" rx="2" ry="2"></rect>
        </svg>
        <span class="logo-text">Editor</span>
        <span class="logo-tag">reels factory</span>
      </a>
      <nav class="nav">
        <a href="/">Home</a>
        <a href="/profiles">Perfiles</a>
        <a href="https://github.com/ilernetworklleida/editor" target="_blank" rel="noopener">
          GitHub
          <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
            <path d="M7 17 17 7"></path><path d="M7 7h10v10"></path>
          </svg>
        </a>
      </nav>
    </div>
  </header>
  <main class="main">
    <div class="container">
      {% block content %}{% endblock %}
    </div>
  </main>
  <footer class="footer">
    <div class="container">
      <span>Editor · pipeline local en tu PC, sin servicios externos</span>
    </div>
  </footer>
  {% block scripts %}{% endblock %}
</body>
</html>
